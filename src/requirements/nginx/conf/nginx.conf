user nginx;

worker_processes auto;
pcre_jit on;
error_log /var/log/nginx/error.log warn;

daemon off; // desactiva el segundo plano de la aplication 


events {
	worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # -------------------------------------------------------------
    # 1. REDIRECCIÓN DE HTTP A HTTPS
    # -------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name ${MyDomain};

        # Redirige permanentemente (301) a la versión HTTPS
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------
    # 2. CONFIGURACIÓN SERVIDOR SEGURO (HTTPS)
    # -------------------------------------------------------------
server {
    listen 443 ssl;
		listen [::]:443 ssl;
    server_name ${MyDomain};

		# Rutas a los certificados dentro del contenedor
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
		
		#old
    # Certificados SSL (apuntando a tus volúmenes de Docker)
   # ssl_certificate /etc/nginx/ssl/live/://tusitio.com;
   # ssl_certificate_key /etc/nginx/ssl/live/://tusitio.com;

    # Habilita ambos protocolos (Nginx negociará 1.3 automáticamente si el cliente lo soporta)
    ssl_protocols TLSv1.2 TLSv1.3;

    # Cifrados ultra-seguros para TLS 1.2 (TLS 1.3 los gestiona internamente)
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # Optimización de rendimiento
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
	}

		location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/lib/nginx/html;
        }

}
